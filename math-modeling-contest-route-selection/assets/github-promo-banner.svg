<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Math Modeling Contest Route Selection Skill</title>
  <desc id="desc">一张 GitHub 宣传横幅，主标题使用英文，其余中文展示数学建模竞赛选题、路线、可行性、验证和反驳。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.52" stop-color="#eefbf7"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="titleInk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#115e59"/>
      <stop offset="1" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.78"/>
    </linearGradient>
    <linearGradient id="barA" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#0284c7"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="barB" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#5eead4"/>
    </linearGradient>
    <linearGradient id="barC" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#86efac"/>
    </linearGradient>
    <linearGradient id="barD" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="barE" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#be123c"/>
      <stop offset="1" stop-color="#fda4af"/>
    </linearGradient>
    <filter id="panelShadow" x="-18%" y="-18%" width="136%" height="146%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <filter id="barShadow" x="-40%" y="-20%" width="180%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <style>
      .font { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", "Source Han Sans SC", "Segoe UI", Arial, sans-serif; letter-spacing: 0; }
      .eyebrow { font-size: 18px; font-weight: 800; fill: #0f766e; }
      .title { font-size: 50px; font-weight: 900; fill: url(#titleInk); }
      .subtitle { font-size: 22px; font-weight: 700; fill: #475569; }
      .caption { font-size: 16px; font-weight: 750; fill: #64748b; }
      .pill { font-size: 17px; font-weight: 850; fill: #0f172a; }
      .panelTitle { font-size: 26px; font-weight: 900; fill: #0f172a; }
      .panelSub { font-size: 16px; font-weight: 750; fill: #64748b; }
      .axis { stroke: #94a3b8; stroke-width: 2; stroke-linecap: round; opacity: 0.55; }
      .grid { stroke: #cbd5e1; stroke-width: 1; opacity: 0.46; }
      .label { font-size: 18px; font-weight: 850; fill: #334155; }
      .score { font-size: 16px; font-weight: 800; fill: #64748b; }
      .bar { filter: url(#barShadow); }
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1065" cy="95" r="230" fill="#22d3ee" opacity="0.15"/>
  <circle cx="1140" cy="552" r="260" fill="#f59e0b" opacity="0.13"/>
  <circle cx="94" cy="560" r="220" fill="#10b981" opacity="0.13"/>

  <g class="font">
    <text x="78" y="96" class="eyebrow">MATH MODELING CONTEST ROUTE SELECTION</text>
    <text x="78" y="166" class="title">Math Modeling</text>
    <text x="78" y="226" class="title">Contest Route</text>
    <text x="78" y="286" class="title">Selection Skill</text>
    <text x="80" y="340" class="subtitle">让 AI 不再盲目选题</text>
    <text x="80" y="374" class="subtitle">用可审计路线证明建模方案优越性</text>
  </g>

  <g class="font" transform="translate(80 408)">
    <rect x="0" y="0" width="142" height="42" rx="21" fill="#ffffff" opacity="0.84" stroke="#bae6fd"/>
    <text x="29" y="28" class="pill">选题对比</text>
    <rect x="162" y="0" width="142" height="42" rx="21" fill="#ffffff" opacity="0.84" stroke="#bbf7d0"/>
    <text x="191" y="28" class="pill">路线评分</text>
    <rect x="324" y="0" width="142" height="42" rx="21" fill="#ffffff" opacity="0.84" stroke="#fed7aa"/>
    <text x="353" y="28" class="pill">反驳检验</text>
  </g>

  <g class="font">
    <rect x="80" y="526" width="208" height="34" rx="17" fill="#ffffff" opacity="0.70" stroke="#dbeafe"/>
    <text x="104" y="548" class="caption">国赛 A/B/C · 美赛</text>
    <rect x="304" y="526" width="284" height="34" rx="17" fill="#ffffff" opacity="0.70" stroke="#d1fae5"/>
    <text x="328" y="548" class="caption">逐问建模 · 可行性审计</text>
    <text x="82" y="590" class="caption">math-modeling-contest-route-selection</text>
  </g>

  <g transform="translate(612 72)" filter="url(#panelShadow)">
    <rect x="0" y="0" width="586" height="500" rx="34" fill="url(#glass)"/>
    <rect x="0" y="0" width="586" height="500" rx="34" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.90"/>

    <g class="font">
      <text x="42" y="60" class="panelTitle">五维路线评分柱状图</text>
      <text x="42" y="91" class="panelSub">从基础可做到可验证、可反驳、可落地。</text>
    </g>

    <line x1="76" y1="160" x2="526" y2="160" class="grid"/>
    <line x1="76" y1="220" x2="526" y2="220" class="grid"/>
    <line x1="76" y1="280" x2="526" y2="280" class="grid"/>
    <line x1="76" y1="340" x2="526" y2="340" class="grid"/>
    <line x1="76" y1="404" x2="526" y2="404" class="axis"/>

    <g class="font">
      <text x="40" y="166" class="score">5.0</text>
      <text x="40" y="226" class="score">4.0</text>
      <text x="40" y="286" class="score">3.0</text>
      <text x="40" y="346" class="score">2.0</text>
    </g>

    <g>
      <rect class="bar" x="142" y="214" width="58" height="190" rx="16" fill="url(#barA)">
        <animate attributeName="y" values="404;214;226;214" dur="3s" begin="0s" repeatCount="indefinite"/>
        <animate attributeName="height" values="0;190;178;190" dur="3s" begin="0s" repeatCount="indefinite"/>
      </rect>
      <rect class="bar" x="224" y="178" width="58" height="226" rx="16" fill="url(#barB)">
        <animate attributeName="y" values="404;178;190;178" dur="3s" begin="0.12s" repeatCount="indefinite"/>
        <animate attributeName="height" values="0;226;214;226" dur="3s" begin="0.12s" repeatCount="indefinite"/>
      </rect>
      <rect class="bar" x="306" y="190" width="58" height="214" rx="16" fill="url(#barC)">
        <animate attributeName="y" values="404;190;202;190" dur="3s" begin="0.24s" repeatCount="indefinite"/>
        <animate attributeName="height" values="0;214;202;214" dur="3s" begin="0.24s" repeatCount="indefinite"/>
      </rect>
      <rect class="bar" x="388" y="154" width="58" height="250" rx="16" fill="url(#barD)">
        <animate attributeName="y" values="404;154;166;154" dur="3s" begin="0.36s" repeatCount="indefinite"/>
        <animate attributeName="height" values="0;250;238;250" dur="3s" begin="0.36s" repeatCount="indefinite"/>
      </rect>
      <rect class="bar" x="470" y="202" width="58" height="202" rx="16" fill="url(#barE)">
        <animate attributeName="y" values="404;202;214;202" dur="3s" begin="0.48s" repeatCount="indefinite"/>
        <animate attributeName="height" values="0;202;190;202" dur="3s" begin="0.48s" repeatCount="indefinite"/>
      </rect>
    </g>

    <g class="font">
      <text x="153" y="444" class="label">选题</text>
      <text x="235" y="444" class="label">路线</text>
      <text x="317" y="444" class="label">可行</text>
      <text x="399" y="444" class="label">验证</text>
      <text x="481" y="444" class="label">反驳</text>
    </g>
  </g>
</svg>
